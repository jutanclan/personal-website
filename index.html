<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mikejutan.com — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-bg:      #0a0a0f;
      --c-lime:    #c6f135;
      --c-coral:   #ff5f4b;
      --c-sky:     #38d9f5;
      --c-violet:  #9b5de5;
      --c-gold:    #ffd166;
      --c-white:   #f0ede6;
    }

    html, body {
      height: 100%;
      background: var(--c-bg);
      color: var(--c-white);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
    }

    /* ── Roaming gradient blobs ── */
    .blobs {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(110px);
      opacity: 0.35;
      animation: drift linear infinite;
    }
    .blob-1 { width: 520px; height: 520px; background: var(--c-violet); top: -120px; left: -100px; animation-duration: 22s; }
    .blob-2 { width: 420px; height: 420px; background: var(--c-coral);  bottom: -80px; right: -80px;  animation-duration: 18s; animation-delay: -6s; }
    .blob-3 { width: 340px; height: 340px; background: var(--c-sky);    top: 40%; left: 50%;          animation-duration: 26s; animation-delay: -11s; }

    @keyframes drift {
      0%   { transform: translate(0, 0)    rotate(0deg); }
      33%  { transform: translate(60px, -40px) rotate(120deg); }
      66%  { transform: translate(-40px, 60px) rotate(240deg); }
      100% { transform: translate(0, 0)    rotate(360deg); }
    }

    /* ── Main layout ── */
    .stage {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(1.5rem, 4vw, 3rem);
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }
    .topbar .domain {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.2rem, 2.5vw, 1.6rem);
      letter-spacing: 0.12em;
      color: var(--c-lime);
    }
    .topbar .tag {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--c-white);
      opacity: 0.45;
      padding-top: 0.3rem;
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2rem;
      max-width: 820px;
    }

    .kicker {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.45s;
    }
    .kicker-line {
      width: 40px; height: 2px;
      background: var(--c-coral);
    }
    .kicker span {
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--c-coral);
    }

    .headline {
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.65s;
    }
    .headline h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 14vw, 13rem);
      line-height: 0.88;
      letter-spacing: 0.01em;
      color: var(--c-white);
    }
    .headline h1 em {
      font-style: normal;
      color: var(--c-lime);
      display: inline-block;
      animation: colorCycle 8s linear infinite;
    }

    @keyframes colorCycle {
      0%,100% { color: var(--c-lime); }
      25%      { color: var(--c-sky); }
      50%      { color: var(--c-gold); }
      75%      { color: var(--c-coral); }
    }

    .sub {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.2vw, 1.5rem);
      color: var(--c-white);
      opacity: 0.6;
      max-width: 480px;
      line-height: 1.55;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.85s;
    }

    /* ── Colour chips ── */
    .chips {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 1.05s;
    }
    .chip {
      height: 8px;
      border-radius: 99px;
      animation: chipPulse 3s ease-in-out infinite;
    }
    .chip:nth-child(1) { width: 56px;  background: var(--c-lime);   animation-delay: 0s; }
    .chip:nth-child(2) { width: 32px;  background: var(--c-coral);  animation-delay: 0.3s; }
    .chip:nth-child(3) { width: 44px;  background: var(--c-sky);    animation-delay: 0.6s; }
    .chip:nth-child(4) { width: 24px;  background: var(--c-violet); animation-delay: 0.9s; }
    .chip:nth-child(5) { width: 38px;  background: var(--c-gold);   animation-delay: 1.2s; }

    @keyframes chipPulse {
      0%,100% { opacity: 1; transform: scaleY(1); }
      50%      { opacity: 0.5; transform: scaleY(0.6); }
    }

    /* ── Bottom bar ── */
    .bottombar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.2s;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 99px;
      padding: 0.45rem 1rem;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--c-lime);
      box-shadow: 0 0 8px var(--c-lime);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.2; }
    }

    .copyright {
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.3;
    }

    /* ── Reveal animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Override sub double-declaration */
    .sub { opacity: 0; animation: fadeUp 0.9s ease forwards 0.85s; }

    /* ── Responsive tweak ── */
    @media (max-width: 500px) {
      .headline h1 { font-size: clamp(4rem, 22vw, 7rem); }
    }
  </style>
</head>
<body>

  <div class="blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="stage">

    <header class="topbar">
      <div class="domain">mikejutan.com</div>
      <div class="tag">Redesign in progress</div>
    </header>

    <main class="hero">
      <div class="kicker">
        <div class="kicker-line"></div>
        <span>Something bold is coming</span>
      </div>

      <div class="headline">
        <h1>COMING<br /><em>SOON</em></h1>
      </div>

      <p class="sub">
        At long last, a new website is coming<br />
        Keep an eye out for a fancy new mikejutan.com... soon(ish)
      </p>

      <div class="chips">
        <div class="chip"></div>
        <div class="chip"></div>
        <div class="chip"></div>
        <div class="chip"></div>
        <div class="chip"></div>
      </div>
    </main>

    <footer class="bottombar">
      <div class="status-pill">
        <div class="status-dot"></div>
        Redesign underway
      </div>
      <div class="copyright">&copy; 2026 Mike Jutan. All rights reserved.</div>
    </footer>

  </div>

</body>
</html>
